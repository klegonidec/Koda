services:
  app:
    build: .
    env_file: .env
    environment:
      DATABASE_URL: sqlite:///data/koda.db?mode=rwc
      OPENCODE_BASE_URL: http://opencode:4096
      HTTPS_PROXY: http://egress:3128
      HTTP_PROXY: http://egress:3128
      NO_PROXY: opencode,app,egress,localhost,127.0.0.1
    ports:
      - "8080:8080"
    volumes:
      - koda_data:/data
      - koda_workspaces:/workspaces
    depends_on:
      opencode:
        condition: service_started
      egress:
        condition: service_started
    restart: unless-stopped
    security_opt:
      - no-new-privileges:true
    cap_drop: [ALL]

  opencode:
    build:
      context: .
      dockerfile: Dockerfile.opencode
      args:
        OPENCODE_VERSION: ${OPENCODE_VERSION:-1.0.0}
    environment:
      OPENCODE_SERVER_USERNAME: ${OPENCODE_SERVER_USERNAME:-opencode}
      OPENCODE_SERVER_PASSWORD: ${OPENCODE_SERVER_PASSWORD:?Set OPENCODE_SERVER_PASSWORD}
      HTTPS_PROXY: http://egress:3128
      HTTP_PROXY: http://egress:3128
      NO_PROXY: opencode,app,egress,localhost,127.0.0.1
    expose:
      - "4096"
    volumes:
      - koda_workspaces:/workspaces
      - koda_opencode:/opencode-config
    restart: unless-stopped
    security_opt:
      - no-new-privileges:true
    cap_drop: [ALL]

  egress:
    build: .
    command: ["/usr/local/bin/koda-egress"]
    environment:
      KODA_EGRESS_ALLOWLIST: "api.openai.com,mcp.context7.com,api.anthropic.com"
      KODA_EGRESS_BIND: "0.0.0.0:3128"
    expose:
      - "3128"
    restart: unless-stopped
    security_opt:
      - no-new-privileges:true
    cap_drop: [ALL]

volumes:
  koda_data:
  koda_workspaces:
  koda_opencode:
