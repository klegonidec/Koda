services:
  app:
    build: .
    env_file: .env
    environment:
      DATABASE_URL: sqlite:///data/duo-bridge.db?mode=rwc
      OPENCODE_BASE_URL: http://opencode:4096
    ports:
      - "8080:8080"
    volumes:
      - duo_data:/data
      - duo_workspaces:/workspaces
    depends_on:
      opencode:
        condition: service_started
    restart: unless-stopped
    security_opt:
      - no-new-privileges:true
    cap_drop: [ALL]

  opencode:
    build:
      context: .
      dockerfile: Dockerfile.opencode
      args:
        OPENCODE_VERSION: ${OPENCODE_VERSION:-1.0.0}
    environment:
      OPENCODE_SERVER_USERNAME: ${OPENCODE_SERVER_USERNAME:-opencode}
      OPENCODE_SERVER_PASSWORD: ${OPENCODE_SERVER_PASSWORD:?Set OPENCODE_SERVER_PASSWORD}
    expose:
      - "4096"
    volumes:
      - duo_workspaces:/workspaces
      - duo_opencode:/opencode-config
    restart: unless-stopped
    security_opt:
      - no-new-privileges:true
    cap_drop: [ALL]

volumes:
  duo_data:
  duo_workspaces:
  duo_opencode:
